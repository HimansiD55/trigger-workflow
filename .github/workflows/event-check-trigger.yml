name: Event Trigger Check

on:
  push:
    branches:
      - main
      
  pull_request:
    branches:
      - main
    types: [opened, synchronize]
    
jobs:
   check-event:
    runs-on: ubuntu-latest

    steps:
      - name: Print Event Name
        run: echo "This workflow was triggered by ${{ github.event_name }}"
